<!DOCTYPE html>
<html>
<head>
<title>Members</title>
</head>
<body>

<h2>Members</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Role</th>
</tr>

{{range .}}

<tr>
<td>{{.ID}}</td>
<td>{{.Name}}</td>
<td>{{.Phone}}</td>
<td>{{.Role}}</td>
</tr>

{{end}}

</table>

</body>
</html>
